name: CI

# Runs on every push to main and every pull request: typecheck + test + build
# across the supported Node range, so breakage is caught before a release tag.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22] # engines: >=20; 20 is the floor, 22 the current LTS
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
