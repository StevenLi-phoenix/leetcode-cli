name: Release

# Cut a release by pushing a version tag that matches package.json, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds + typechecks + tests, then publishes to npm (via OIDC Trusted
# Publishing — no token) and to GitHub Packages (GITHUB_TOKEN), and creates a
# GitHub Release with the packed tarball attached. Each publish is idempotent:
# if the version is already on a registry it's skipped, so re-running a release
# (or a tag pushed after a one-time local bootstrap publish) is safe.
#
# ONE-TIME BOOTSTRAP (npm Trusted Publishing can't be configured for a package
# that doesn't exist yet — npm/cli#8544):
#   1. Publish v0.1.0 once from your machine with a token:
#        pnpm build && npm publish --access public
#   2. On npmjs.com → the package's Access settings → add a Trusted Publisher:
#        GitHub Actions, repo StevenLi-phoenix/leetcode-cli, workflow release.yml
#      and set publishing access to "Require 2FA and disallow tokens".
#   3. Revoke the bootstrap token. Every later release is pure OIDC via this file.

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # REQUIRED: mints the OIDC token for npm Trusted Publishing + provenance
  contents: write # create the GitHub Release (also covers checkout)
  packages: write # publish to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: 22 # npm Trusted Publishing needs Node >= 22.14
          cache: pnpm

      - name: Upgrade npm for OIDC Trusted Publishing
        run: npm install -g npm@latest # Node 22 ships npm 10.x; OIDC needs npm >= 11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version consistency (tag == package.json == src VERSION)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          SRC="$(node -e "const fs=require('fs');const m=fs.readFileSync('src/index.ts','utf8').match(/const VERSION = '([^']+)'/);process.stdout.write(m?m[1]:'')")"
          echo "tag=$TAG  package.json=$PKG  src/index.ts=$SRC"
          [ "$TAG" = "$PKG" ] || { echo "::error::git tag ($TAG) != package.json version ($PKG)"; exit 1; }
          [ "$TAG" = "$SRC" ] || { echo "::error::git tag ($TAG) != src/index.ts VERSION ($SRC)"; exit 1; }

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack # -> stevenli-phoenix-leetcode-cli-<version>.tgz

      - name: Publish to npm (Trusted Publishing, OIDC)
        run: |
          PKG="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          # Minimal .npmrc: registry only, NO _authToken line — npm auto-detects
          # the GitHub Actions OIDC environment and publishes with provenance.
          printf 'registry=https://registry.npmjs.org/\n' > .npmrc
          if npm view "$PKG@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "npm: $PKG@$VERSION already published — skipping."
          else
            npm publish --access public
          fi
          rm -f .npmrc

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          cat > .npmrc <<EOF
          @stevenli-phoenix:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          if npm view "$PKG@$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "GitHub Packages: $PKG@$VERSION already published — skipping."
          else
            npm publish
          fi
          rm -f .npmrc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: "*.tgz"
