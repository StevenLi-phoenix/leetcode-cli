name: Release

# Cut a release by pushing a version tag that matches package.json, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds + typechecks + tests, then publishes the package to npm and to
# GitHub Packages, and creates a GitHub Release with the packed tarball attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  packages: write # publish to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Surfaced at job level so the npm-publish step's `if:` can see it.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version consistency (tag == package.json == src VERSION)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          SRC="$(node -e "const fs=require('fs');const m=fs.readFileSync('src/index.ts','utf8').match(/const VERSION = '([^']+)'/);process.stdout.write(m?m[1]:'')")"
          echo "tag=$TAG  package.json=$PKG  src/index.ts=$SRC"
          [ "$TAG" = "$PKG" ] || { echo "::error::git tag ($TAG) != package.json version ($PKG)"; exit 1; }
          [ "$TAG" = "$SRC" ] || { echo "::error::git tag ($TAG) != src/index.ts VERSION ($SRC)"; exit 1; }

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack # -> stevenli-phoenix-leetcode-cli-<version>.tgz

      - name: Publish to npm (public)
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          cat > .npmrc <<EOF
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF
          npm publish --access public
          rm -f .npmrc

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > .npmrc <<EOF
          @stevenli-phoenix:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          npm publish
          rm -f .npmrc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tgz"
